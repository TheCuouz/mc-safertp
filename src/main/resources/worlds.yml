# SafeRTP — world configuration
worlds:
  world:
    enabled: true
    min-radius: 1000
    max-radius: 10000
    center-x: 0
    center-z: 0
    biome-whitelist: []
    biome-blacklist:
      - "DEEP_OCEAN"
      - "OCEAN"
      - "WARM_OCEAN"
      - "LUKEWARM_OCEAN"
      - "COLD_OCEAN"
      - "FROZEN_OCEAN"
      - "DEEP_LUKEWARM_OCEAN"
      - "DEEP_COLD_OCEAN"
      - "DEEP_FROZEN_OCEAN"
    max-attempts: 50
    cost: 0
  world_nether:
    enabled: false
  world_the_end:
    enabled: false

# Default cooldown in seconds. Overridable per-player via safertp.cooldown.<n> permission
cooldown-default: 300

# Warmup duration in seconds before teleporting
warmup-seconds: 5
