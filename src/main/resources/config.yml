# SafeRTP Configuration
# World-specific settings are in worlds.yml

# Active language. ISO-639-1 two-letter code (lowercase).
# Bundled out of the box: es (Spanish), en (English).
# Missing keys fall back to en automatically. Operators can drop extra
# lang/<code>.yml files in plugins/SafeRTP/lang/.
language: es

config-version: 2

# ============================================================
# BACK COMMAND  (v1.1.0)
# ============================================================
# Permite a los jugadores deshacer su último /rtp con /rtp back.
# La localización pre-teleport se cachea en memoria (no DB) y
# expira tras ttl-seconds. Útil cuando el RTP cae en un bioma
# incómodo y el jugador quiere volver donde estaba.
back:
  enabled: true
  ttl-seconds: 300
  cooldown-seconds: 60
